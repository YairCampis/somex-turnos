<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>SOMEX - Ingreso Nuevo Turno Conductor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link href="assets/styles.css" rel="stylesheet" />

    <!-- Iconos -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <style>
      /* ── Google Fonts ── */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      /* ── Reset base ── */
      html, body {
        min-height: 100%;
        font-family: 'Inter', sans-serif;
      }

      /* ── Fondo ── */
      body {
        background-image: url('assets/img/fondo-somex5.jpeg');
        background-size: contain;
        background-position: center bottom;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #eef2ec;
        position: relative;
      }

      /* Overlay muy suave */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(240, 245, 238, 0.55);
        z-index: 0;
      }

      /* ── Encabezado superior mejorado ── */
      .header-bar {
        background: linear-gradient(135deg, #1e5c1a 0%, #307c2b 60%, #3d9e35 100%);
        color: #fff;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 16px rgba(30, 92, 26, 0.35);
        position: relative;
        z-index: 10;
      }

      .header-bar h2 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .header-icon {
        font-size: 26px;
        cursor: pointer;
        color: white;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .header-icon:hover {
        transform: scale(1.15);
        opacity: 0.85;
      }

      /* ── Contenedor con tarjeta glassmorphism ── */
      .container {
        position: relative;
        z-index: 1;
      }

      .form-card {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 20px;
        padding: 2rem 2.5rem;
        box-shadow: 0 8px 32px rgba(48, 124, 43, 0.13), 0 2px 8px rgba(0,0,0,0.08);
      }

      /* ── Título dentro del formulario ── */
      .form-card-title {
        font-size: 1rem;
        font-weight: 700;
        color: #1e5c1a;
        letter-spacing: 0.4px;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 2px solid rgba(48, 124, 43, 0.15);
        padding-bottom: 0.75rem;
      }

      /* ── Labels ── */
      .form-label {
        font-size: 0.78rem;
        font-weight: 600;
        color: #1e5c1a;
        letter-spacing: 0.3px;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      /* ── Inputs y selects ── */
      .form-control,
      .form-select {
        border: 1.5px solid #c8ddc5;
        border-radius: 10px;
        padding: 0.55rem 1rem;
        font-size: 0.92rem;
        font-family: 'Inter', sans-serif;
        background: rgba(255,255,255,0.9);
        color: #2d2d2d;
        transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      }

      .form-control::placeholder {
        color: #a8b8a4;
        font-size: 0.87rem;
      }

      .form-control:hover,
      .form-select:hover {
        border-color: #7ab87a;
        background: #fff;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #307c2b;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(48, 124, 43, 0.15);
        outline: none;
      }

      /* ── Input groups con ícono ── */
      .input-group-text {
        background: linear-gradient(135deg, #307c2b, #3d9e35);
        color: white;
        border: none;
        border-radius: 10px 0 0 10px;
        padding: 0 14px;
        font-size: 1rem;
      }

      .input-group .form-control,
      .input-group .form-select {
        border-radius: 0 10px 10px 0;
      }

      .input-group:focus-within .input-group-text {
        box-shadow: 0 0 0 3px rgba(48, 124, 43, 0.15);
      }

      /* ── Feedback de validación ── */
      .invalid-feedback {
        font-size: 0.78rem;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <!-- ========================================================= -->
    <!-- ENCABEZADO SUPERIOR -->
    <!-- ========================================================= -->
    <div class="header-bar">
      <i
        class="bi bi-arrow-left-circle header-icon"
        onclick="history.back()"
      ></i>
      <!--<i class="bi bi-arrow-left-circle header-icon"></i>-->
      <h2>Ingreso Nuevo Turno</h2>
      <i id="btnGuardarTurno" class="bi bi-check-circle header-icon"></i>
    </div>

    <div class="container my-4">
      <!-- ========================================================= -->
      <!-- FORMULARIO -->
      <!-- ========================================================= -->

      <form id="formTurno">
        <div class="row g-4">
          <div class="col-md-4">
            <label class="form-label">* Cédula</label>
            <input
              type="text"
              id="cedula"
              class="form-control"
              placeholder="Digite su Cédula"
              required
            />
            <div class="invalid-feedback">Ingrese la cédula.</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">* Nombre Completo</label>
            <input
              type="text"
              id="nombre"
              class="form-control"
              placeholder="Digite Nombre completo"
              required
            />
            <div class="invalid-feedback">Ingrese Nombre Completo</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">* Celular</label>
            <input
              type="text"
              id="celular"
              class="form-control"
              placeholder="Digite número de celular"
              required
            />
            <div class="invalid-feedback">Ingrese Celular</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">* Placa</label>
            <input
              type="text"
              id="placa"
              class="form-control"
              placeholder="Digite placa del vehículo"
              required
            />
            <div class="invalid-feedback">Ingrese placa</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">* Tipo vehículo</label>
            <select id="tipo_vehiculo" class="form-select" required>
              <!--<select class="form-select">-->
              <option value="" disabled selected>Seleccionar...</option>
              <option value="mula">Mula</option>
              <option value="camion">Camión</option>
              <option value="tractomula">Tractomula</option>
              <option value="sencillo">Sencillo</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Destino Final</label>
            <input
              type="text"
              id="destinoFinal"
              class="form-control"
              placeholder="Digite su destino final"
              required
            />
            <div class="invalid-feedback">Ingrese Destino Final</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">* Tipo de visita</label>
            <select id="tipoVisita" class="form-select" required>
              <option value="" disabled selected>Seleccionar...</option>
              <option>Producto Terminado</option>
              <option>Materia Prima</option>
            </select>
          </div>
        </div>
      </form>

      <!-- ========================================================= -->
      <!-- TABLA DE HISTORIAL -->
      <!-- ========================================================= -->

<!--       <div class="table-responsive mt-4">
        <table class="table table-bordered">
          <thead class="table-header">
            <tr>
              <th>Turno</th>
              <th>Cédula</th>
              <th>Conductor</th>
              <th>Placa</th>
              <th>Celular</th>
              <th>Estado</th>
              <th>Destino Final</th>
              <th>Tipo Visita</th>
            </tr>
          </thead>

          <tbody id="tablaTurnos">
            
          </tbody>
        </table>
      </div>
    </div> -->

    <!-- =============================================== -->
    <!-- LIBRERÍAS EXTERNAS -->
    <!-- =============================================== -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      // ==============================================
      // 1. Cargar turnos desde backend real
      // ==============================================
      async function cargarTurnos() {
        try {
          const resp = await fetch("http://localhost:4000/api/turnos");
          const turnos = await resp.json();
          pintarTabla(turnos);
        } catch (error) {
          console.error("Error cargando turnos:", error);
        }
      }

      // ==============================================
      // 2. Pintar la tabla dinámicamente
      // ==============================================
      function pintarTabla(turnos) {
        const tbody = document.getElementById("tablaTurnos");
        tbody.innerHTML = "";

        turnos.forEach((t) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${t.numeroTurno}</td>
            <td>${t.cedula}</td>
            <td>${t.conductor}</td>
            <td>${t.placa}</td>
            <td>${t.celular}</td>
            <td>${t.estado}</td>
            <td>${t.destinoFinal}</td>
            <td>${t.tipoVisita}</td>
        `;

          tbody.appendChild(tr);
        });
      }

      // ==============================================
      // 3. Recargar tabla automáticamente cada 5 segundos
      // ==============================================
      setInterval(cargarTurnos, 5000);

      // ==============================================
      // 4. Cargar tabla al abrir la página
      // ==============================================
      document.addEventListener("DOMContentLoaded", cargarTurnos);
    </script>

    <!-- =============================================== 
          BOTON btnGuardarTurno -
        =============================================== -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      document
        .getElementById("btnGuardarTurno")
        .addEventListener("click", async () => {
          const nombre = document.getElementById("nombre").value.trim();
          const placa = document.getElementById("placa").value.trim();
          const cedula = document.getElementById("cedula").value.trim();
          const celular = document.getElementById("celular").value.trim();
          const tipoVehiculo = document.getElementById("tipo_vehiculo").value;
          const destinoFinal = document
            .getElementById("destinoFinal")
            .value.trim();
          const tipoVisita = document.getElementById("tipoVisita").value;

          // LIMPIAR ERRORES
          document.querySelectorAll(".is-invalid").forEach((el) => {
            el.classList.remove("is-invalid");
          });

          // VALIDAR CAMPOS
          if (!cedula)
            document.getElementById("cedula").classList.add("is-invalid");
          if (!nombre)
            document.getElementById("nombre").classList.add("is-invalid");
          if (!celular)
            document.getElementById("celular").classList.add("is-invalid");
          if (!destinoFinal)
            document.getElementById("destinoFinal").classList.add("is-invalid");
          if (!placa)
            document.getElementById("placa").classList.add("is-invalid");
          if (!tipoVehiculo)
            document
              .getElementById("tipo_vehiculo")
              .classList.add("is-invalid");
          if (!tipoVisita)
            document.getElementById("tipoVisita").classList.add("is-invalid");

          if (
            !nombre ||
            !placa ||
            !cedula ||
            !celular ||
            !tipoVehiculo ||
            !destinoFinal ||
            !tipoVisita
          ) {
            Swal.fire({
              icon: "warning",
              title: "Campos incompletos",
              text: "Por favor diligencie todos los campos obligatorios.",
            });
            return;
          }

          try {
            // ============================
            // BUSCAR CONDUCTOR
            // ============================
            const respBuscar = await fetch(
              `http://localhost:4000/api/conductores/buscar/${cedula}`,
            );
            const conductorResp = await respBuscar.json();

            console.log("RESPUESTA BUSCAR:", conductorResp);

            let conductor = conductorResp;

            // ============================
            // SI NO EXISTE, CREAR
            // ============================
            if (!conductor || !conductor.idConductor) {
              const respCrear = await fetch(
                "http://localhost:4000/api/conductores",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    cedula,
                    nombreCompleto: nombre,
                    celular,
                    placa,
                    tipoVehiculo,
                    destinoFinal,
                    tipoVisita,
                  }),
                },
              );

              const nuevo = await respCrear.json();
              console.log("CONDUCTOR CREADO:", nuevo);

              conductor = nuevo;
            }

            // ============================
            // OBTENER ID SEGURO
            // ============================
            const idConductor =
              conductor.idConductor || conductor.id || conductor.insertId;

            console.log("ID CONDUCTOR:", idConductor);

            if (!idConductor) {
              Swal.fire({
                icon: "error",
                title: "Error",
                text: "No se pudo obtener el ID del conductor",
              });
              return;
            }

            // ============================
            // CREAR TURNO
            // ============================
            const respTurno = await fetch("http://localhost:4000/api/turnos", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                idConductor,
                destinoFinal,
                tipoVisita,
                placa,
                tipoVehiculo,
              }),
            });

            // 🔴 VALIDAR RESPUESTA BACKEND
            if (!respTurno.ok) {
              const errorData = await respTurno.json();
              console.error("ERROR BACKEND:", errorData);

              Swal.fire({
                icon: "warning",
                title: "No se pudo crear el turno",
                text: errorData.msg || errorData.error || "Error desconocido",
              });
              return;
            }

            const turno = await respTurno.json();
            console.log("TURNO CREADO:", turno);

            // ============================
            // GUARDAR IDENTIDAD Y TURNO
            // ============================
          /*   localStorage.setItem("idConductor", idConductor);
            localStorage.setItem("miTurno", turno.numeroTurno);
            localStorage.setItem("tengoTurno", "true");*/
            
            localStorage.setItem("turno", JSON.stringify({ 
              id_turno: turno.idTurno || turno.id_turno,
              numeroTurno: turno.numeroTurno,
              estado: turno.estado || "Pendiente"
            }));

// limpiar estado anterior
localStorage.removeItem("turnoFinalizado");


            console.log("Turno guardado en localStorage:", {
              idConductor,
              miTurno: turno.numeroTurno,
            });

            // ============================
            // ÉXITO
            // ============================
            await Swal.fire({
              icon: "success",
              title: "Turno asignado",
              text: `Turno #${turno.numeroTurno || turno.idTurno} asignado correctamente.`,
            });

             // bloquear botón
            document.querySelector("#btnGuardarTurno").style.pointerEvents = "none";
           
            // pequeño delay para UX
                setTimeout(() => {
                  window.location.href = "conductor.html";
                }, 500);

            // ACTUALIZAR TABLA
            cargarTurnos();

            // LIMPIAR FORMULARIO
            document.getElementById("formTurno").reset();
          } catch (error) {
            console.error("ERROR COMPLETO:", error);

            Swal.fire({
              icon: "error",
              title: "Error",
              text: "Ocurrió un problema al asignar el turno.",
            });
          }
        });
      
      document.addEventListener("DOMContentLoaded", () => {
          const placaEl = document.getElementById('placa');
          if(placaEl) {
              placaEl.addEventListener('input', function() {
                  this.value = this.value.toUpperCase();
              });
          }
      });
    </script>
  </body>
</html>

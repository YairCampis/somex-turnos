<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Login Empleados - SOMEX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body {
      background-image: url('assets/img/fondo_login.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
    }

    /* Overlay suave para reducir contraste con la tarjeta */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      z-index: 0;
    }

    /* La tarjeta queda por encima del overlay */
    .container {
      position: relative;
      z-index: 1;
    }

    /* Sombra más pronunciada para destacar la tarjeta sobre el fondo */
    .card {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15) !important;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">

  <div class="container" style="max-width:460px">

    <div class="card shadow rounded-4">
      <div class="card-body p-4">

        <div class="mb-3">
          <a href="index.html" class="text-decoration-none text-secondary small">
            <i class="bi bi-arrow-left-circle me-1"></i> Volver al inicio
          </a>
        </div>
        <h3 class="text-center mb-4">Iniciar Sesión</h3>

        <form id="loginForm" class="row g-3">

          <div class="col-12">
            <label class="form-label">Correo</label>
            <input 
              type="email"
              name="correo"
              class="form-control"
              required
              autocomplete="username">
          </div>

          <div class="col-12">
            <label class="form-label">Contraseña</label>
            <input
              type="password"
              name="contrasena"
              class="form-control"
              required
              autocomplete="current-password">
          </div>

          <div class="col-12">
            <button class="btn btn-primary w-100" type="submit">
              Iniciar sesión
            </button>
          </div>

        </form>

        <div id="loginMsg" class="text-danger mt-3 small text-center"></div>

      </div>
    </div>

  </div>


  <!-- API -->
  <script src="assets/js/api.js"></script>

  <script>

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("loginMsg");

    form.addEventListener("submit", async (e) => {

      e.preventDefault();
      msg.textContent = "";

      const fd = new FormData(form);
      const body = Object.fromEntries(fd.entries());

      try {

        const r = await api.post("/api/auth/login", body);

        if (!r.ok) {
          msg.textContent = r.error || "Credenciales inválidas";
          return;
        }

        const { token, user } = r.data;

        // guardar token y usuario
        localStorage.setItem("token", token);
        localStorage.setItem("user", JSON.stringify(user));

        // redirección según rol
        if (user.rol === 1) {
          window.location.href = "admin.html";
        }
        else if (user.rol === 2) {
          window.location.href = "logistica.html";
        }
        else if (user.rol === 3) {
          window.location.href = "porteria.html";
        }
        else {
          window.location.href = "nuevoTurno.html";
        }

      } catch (error) {

        console.error(error);
        msg.textContent = "Error al conectar con el servidor";

      }

    });

  </script>

</body>
</html>
